<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road to 2033 — The Ultimate Milestone Journey</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #060913;
            --panel-bg: rgba(16, 22, 42, 0.65);
            --border-glow: rgba(0, 242, 254, 0.2);
            --neon-blue: #00f2fe;
            --neon-green: #4facfe;
            --neon-purple: #7f00ff;
            --neon-pink: #ff007f;
            --text-main: #f0f4f8;
            --text-muted: #8a99ad;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(127, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 242, 254, 0.15) 0%, transparent 40%);
            background-attachment: fixed;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        .hero-banner {
            position: relative; width: 100%; height: 280px; border-radius: 20px;
            overflow: hidden; margin-bottom: 30px; border: 1px solid var(--border-glow);
        }

        .hero-image {
            width: 100%; height: 100%;
            background: linear-gradient(rgba(6, 9, 19, 0.3), rgba(6, 9, 19, 0.9)), 
                        url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1200&q=80') center/cover no-repeat;
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }

        .hero-title {
            font-family: 'Orbitron', sans-serif; font-size: 3.5rem; font-weight: 900; letter-spacing: 4px;
            text-transform: uppercase; background: linear-gradient(45deg, var(--neon-blue), #ffffff, var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px;
        }

        .hero-subtitle { font-size: 1.4rem; color: var(--text-muted); letter-spacing: 2px; }

        .stats-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { 
            background: var(--panel-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-glow); border-radius: 15px; padding: 20px; text-align: center; 
        }
        .stat-val { font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 700; color: var(--neon-blue); margin-bottom: 5px; }
        .stat-lbl { font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; }

        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        @media (max-width: 900px) { .dashboard-grid { grid-template-columns: 1fr; } .hero-title { font-size: 2.2rem; } }

        .clock-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .clock-card { background: #0b0f19; border: 2px solid #162238; border-radius: 15px; padding: 20px; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        .clock-card.expired { border-color: rgba(255, 51, 51, 0.4); }
        .clock-card.active-target { border-color: var(--neon-pink); }
        
        .clock-year {
            font-family: 'Orbitron', sans-serif; font-size: 1.4rem; font-weight: 700; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .clock-check {
